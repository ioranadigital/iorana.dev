<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IORANA Dev — Acceso Restringido</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:#f5600a;--navy:#0d1f35;--navy-mid:#152a40;
      --white:#ffffff;--text:#c8d8e8;--muted:#6b89a5;
      --border:rgba(255,255,255,0.08);
      --font:'Barlow',sans-serif;--font-cond:'Barlow Condensed',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:var(--font);background:var(--navy);color:var(--white);overflow:hidden}
    .bg{position:fixed;inset:0;z-index:0;
      background:linear-gradient(180deg,rgba(13,31,53,0.6) 0%,rgba(13,31,53,0.75) 50%,rgba(13,31,53,0.95) 100%),
      linear-gradient(135deg,#0a1826 0%,#152a40 50%,#0d1f35 100%)}
    .bg::before{content:'';position:absolute;inset:0;opacity:.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:160px 160px}
    .bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;
      background:radial-gradient(ellipse 120% 60% at 50% 120%,rgba(8,18,32,0.98) 0%,transparent 70%),
      radial-gradient(ellipse 60% 40% at 10% 110%,rgba(10,22,36,0.9) 0%,transparent 60%),
      radial-gradient(ellipse 50% 35% at 90% 115%,rgba(10,22,36,0.9) 0%,transparent 60%)}
    /* Glow orb */
    .glow{position:fixed;width:700px;height:700px;border-radius:50%;
      background:radial-gradient(circle,rgba(245,96,10,0.06) 0%,transparent 65%);
      top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;
      animation:breathe 7s ease-in-out infinite}
    @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;height:64px;
      display:flex;align-items:center;justify-content:space-between;padding:0 40px;
      background:rgba(9,19,33,0.8);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      animation:fadeDown 0.6s ease both}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-icon{width:34px;height:34px;background:var(--orange);border-radius:50%;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-icon svg{width:20px;height:20px;fill:white}
    .logo-text{font-weight:800;font-size:17px;color:var(--white)}
    .logo-text b{color:var(--orange)}
    .nav-badge{display:flex;align-items:center;gap:7px;
      font-family:var(--font-cond);font-size:12px;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .nav-badge::before{content:'';width:7px;height:7px;border-radius:50%;
      background:var(--orange);animation:pdot 2s ease-in-out infinite;flex-shrink:0}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
    main{position:relative;z-index:10;height:100vh;
      display:flex;align-items:center;justify-content:center;padding:80px 24px 24px}
    .card{width:min(480px,100%);background:rgba(13,31,53,0.85);
      border:1px solid var(--border);border-radius:6px;padding:44px 44px 40px;
      backdrop-filter:blur(24px);position:relative;
      box-shadow:0 0 0 1px rgba(245,96,10,0.07),0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
      animation:riseUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both}
    @keyframes riseUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;top:-1px;left:12%;right:12%;height:2px;border-radius:99px;
      background:linear-gradient(90deg,transparent,var(--orange),transparent)}
    .card-header{margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border)}
    .pill{display:inline-flex;align-items:center;gap:6px;
      background:rgba(245,96,10,0.1);border:1px solid rgba(245,96,10,0.25);
      border-radius:99px;padding:4px 14px;
      font-family:var(--font-cond);font-size:11px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:20px}
    .pill::before{content:'';width:6px;height:6px;border-radius:50%;
      background:var(--orange);animation:pdot 1.6s step-end infinite}
    h1{font-weight:900;font-size:32px;line-height:1.08;letter-spacing:-.02em;color:var(--white);margin-bottom:6px}
    h1 em{color:var(--orange);font-style:italic}
    .subtitle{font-size:13px;color:var(--muted);font-weight:400}
    .alert{display:none;align-items:center;gap:9px;padding:11px 14px;border-radius:4px;
      font-size:12px;font-weight:600;margin-bottom:16px;letter-spacing:.01em}
    .alert.show{display:flex;animation:sIn .2s ease}
    @keyframes sIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .alert-d{background:rgba(245,96,10,0.1);border:1px solid rgba(245,96,10,.3);color:#ff8a50}
    .alert-w{background:rgba(245,180,10,0.1);border:1px solid rgba(245,180,10,.3);color:#ffc530}
    .field-label{display:block;font-family:var(--font-cond);font-size:11px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .input-wrap{position:relative;margin-bottom:20px}
    input[type=password],input[type=text]{width:100%;background:rgba(255,255,255,0.04);
      border:1px solid var(--border);border-radius:4px;color:var(--white);
      font-family:var(--font);font-size:15px;font-weight:600;letter-spacing:.1em;
      padding:13px 46px 13px 16px;outline:none;caret-color:var(--orange);
      transition:border-color .2s,background .2s,box-shadow .2s}
    input::placeholder{color:var(--muted);letter-spacing:.03em;font-weight:400;font-size:14px}
    input:focus{border-color:var(--orange);background:rgba(245,96,10,0.04);box-shadow:0 0 0 3px rgba(245,96,10,0.12)}
    input.err{border-color:rgba(245,96,10,.6);box-shadow:0 0 0 3px rgba(245,96,10,.1)}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;transition:color .2s}
    .eye-btn:hover{color:var(--orange)}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    .shake{animation:shake .45s cubic-bezier(.36,.07,.19,.97) both}
    .btn{width:100%;padding:14px 20px;background:var(--orange);border:none;border-radius:4px;
      color:var(--white);font-family:var(--font);font-size:14px;font-weight:800;
      letter-spacing:.06em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;
      transition:background .2s,transform .1s,box-shadow .2s;
      box-shadow:0 4px 20px rgba(245,96,10,.35)}
    .btn::after{content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none}
    .btn:hover{background:#e05508;box-shadow:0 6px 28px rgba(245,96,10,.5)}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .spinner{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .btn.loading .btn-text{opacity:0}
    .btn.loading .spinner{display:block}
    .card-footer{display:flex;justify-content:space-between;align-items:center;
      margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
    .finfo{font-family:var(--font-cond);font-size:11px;color:var(--muted);
      letter-spacing:.06em;text-transform:uppercase}
    .finfo b{color:rgba(255,255,255,.35);font-weight:600}
    #successOverlay{display:none;position:fixed;inset:0;z-index:200;background:var(--navy);
      flex-direction:column;align-items:center;justify-content:center;gap:18px}
    #successOverlay.show{display:flex;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .s-ring{width:66px;height:66px;border-radius:50%;border:2px solid var(--orange);
      display:flex;align-items:center;justify-content:center;color:var(--orange);
      box-shadow:0 0 32px rgba(245,96,10,.25);animation:riseUp .5s cubic-bezier(.22,1,.36,1) both}
    .s-title{font-weight:900;font-size:28px;letter-spacing:-.02em;color:var(--white)}
    .s-title em{color:var(--orange);font-style:italic}
    .s-sub{font-family:var(--font-cond);font-size:13px;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .p-track{width:220px;height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:4px}
    .p-fill{height:100%;background:var(--orange);border-radius:99px;width:0;
      transition:width 1.5s linear;box-shadow:0 0 8px rgba(245,96,10,.6)}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="glow"></div>

<nav>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <span class="logo-text"><b>IORANA</b> Dev</span>
  </a>
  <div class="nav-badge">Acceso restringido</div>
</nav>

<main>
  <div class="card">
    <div class="card-header">
      <div class="pill">Entorno privado</div>
      <h1>Accede al<br><em>portal interno.</em></h1>
      <p class="subtitle">Área exclusiva de desarrollo y pruebas · iorana.dev</p>
    </div>

    <div class="alert alert-d" id="alertDanger">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertText">Contraseña incorrecta.</span>
    </div>
    <div class="alert alert-w" id="alertWarning">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="alertWarnText">Demasiados intentos. Espera 15 minutos.</span>
    </div>

    <label class="field-label" for="password">Contraseña de acceso</label>
    <div class="input-wrap" id="inputWrap">
      <input type="password" id="password" placeholder="Introduce tu clave de acceso" autocomplete="current-password" autofocus />
      <button class="eye-btn" id="eyeBtn" type="button">
        <svg id="eyeIcon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="btn" id="loginBtn" type="button">
      <span class="btn-text">Acceder →</span>
      <div class="spinner"></div>
    </button>

    <div class="card-footer">
      <div class="finfo">Estado <b>ONLINE</b></div>
      <div class="finfo" id="clock"></div>
    </div>
  </div>
</main>

<div id="successOverlay">
  <div class="s-ring">
    <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="s-title">Acceso <em>concedido.</em></div>
  <div class="s-sub">Iniciando sesión…</div>
  <div class="p-track"><div class="p-fill" id="pFill"></div></div>
</div>

<script>
  const clockEl = document.getElementById('clock');
  const tick = () => clockEl.textContent = new Date().toLocaleTimeString('es-ES');
  tick(); setInterval(tick, 1000);

  const pwInput = document.getElementById('password');
  const eyeBtn  = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');
  const iShow = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const iHide = `<path d="M17.94 17.94A10 10 0 0112 20c-7 0-11-8-11-8a18.5 18.5 0 015.06-5.94M9.9 4.24A9.1 9.1 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  eyeBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? iHide : iShow;
  });

  const btn    = document.getElementById('loginBtn');
  const alertD = document.getElementById('alertDanger');
  const alertW = document.getElementById('alertWarning');
  const wrap   = document.getElementById('inputWrap');

  const clear = () => { alertD.classList.remove('show'); alertW.classList.remove('show'); pwInput.classList.remove('err'); };

  async function doLogin() {
    clear();
    const password = pwInput.value;
    if (!password) { pwInput.focus(); return; }
    btn.disabled = true; btn.classList.add('loading');
    try {
      const res  = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
      const data = await res.json();
      if (res.status === 429) {
        document.getElementById('alertWarnText').textContent = data.error;
        alertW.classList.add('show'); btn.disabled=false; btn.classList.remove('loading'); return;
      }
      if (!data.success) {
        document.getElementById('alertText').textContent = data.error || 'Contraseña incorrecta.';
        alertD.classList.add('show'); pwInput.classList.add('err');
        wrap.classList.add('shake');
        wrap.addEventListener('animationend', () => wrap.classList.remove('shake'), {once:true});
        pwInput.value=''; pwInput.focus(); btn.disabled=false; btn.classList.remove('loading'); return;
      }
      const ov = document.getElementById('successOverlay');
      ov.classList.add('show');
      setTimeout(() => document.getElementById('pFill').style.width='100%', 50);
      setTimeout(() => window.location.href = data.redirect || '/portal', 1700);
    } catch {
      document.getElementById('alertText').textContent = 'Error de conexión.';
      alertD.classList.add('show'); btn.disabled=false; btn.classList.remove('loading');
    }
  }
  btn.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', e => e.key==='Enter' && doLogin());
  pwInput.addEventListener('input', clear);
</script>
</body>
</html>
