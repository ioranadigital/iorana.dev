<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IORANA Dev — Gestión de Infraestructura</title>
    
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5600a">
    <meta name="description" content="Portal privado de IORANA Digital">
    <meta name="robots" content="noindex, nofollow">

    <style>
        :root {
            --bg: #0d1f35;
            --card-bg: #162a44;
            --orange: #f5600a;
            --text: #c8d8e8;
            --muted: #6b89a5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--orange);
            border-radius: 50%;
        }

        .container {
            padding: 50px;
            flex-grow: 1;
        }

        h1 { font-size: 48px; margin-bottom: 10px; }
        h1 span { color: var(--orange); font-style: italic; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .tool-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tool-card:hover {
            border-color: var(--orange);
            transform: translateY(-5px);
        }

        .card-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .card-desc { color: var(--muted); font-size: 14px; line-height: 1.6; }
        
        .card-tag {
            display: inline-block;
            margin-top: 15px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(245, 96, 10, 0.1);
            color: var(--orange);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--muted);
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout-btn:hover {
            border-color: var(--orange);
            color: var(--orange);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-dot"></div>
            IORANA <span>Dev</span>
        </div>
        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </header>

    <div class="container">
        <p style="color: var(--muted); margin: 0;">Entorno privado de IORANA Digital</p>
        <h1>Gestiona tu <span>infraestructura.</span></h1>

        <div class="grid" id="toolsGrid">
            </div>
    </div>

    <script>
        async function logout() {
            await fetch('/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }

        async function loadTools() {
            try {
                const res = await fetch('/api/my-tools');
                const data = await res.json();
                
                const grid = document.getElementById('toolsGrid');
                grid.innerHTML = '';

                // Lista de herramientas configuradas
                const allTools = [
                    {
                        id: 'n8n.iorana.dev',
                        name: 'n8n Automation',
                        desc: 'Flujos de trabajo y automatizaciones inteligentes para IORANA.',
                        url: 'https://n8n.iorana.dev',
                        tag: 'Workflow'
                    }
                    // Aquí puedes añadir más herramientas en el futuro
                ];

                const myTools = allTools.filter(t => 
                    data.tools.includes('*') || data.tools.includes(t.id)
                );

                if (myTools.length === 0) {
                    grid.innerHTML = '<p>No tienes herramientas asignadas.</p>';
                    return;
                }

                myTools.forEach(tool => {
                    grid.innerHTML += `
                        <a href="${tool.url}" class="tool-card">
                            <div class="card-title">${tool.name}</div>
                            <div class="card-desc">${tool.desc}</div>
                            <span class="card-tag">${tool.tag}</span>
                        </a>
                    `;
                });

            } catch (e) {
                window.location.href = '/';
            }
        }

        loadTools();
    </script>
</body>
</html>
