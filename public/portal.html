<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IORANA Dev — Portal</title>
  <style>
    /* ... (Tus estilos CSS) ... */
  </style>
</head>
<body>
<div class="bg"></div>

<nav class="topbar">
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <span class="logo-text"><b>IORANA</b> Dev</span>
  </a>
  <div class="topbar-right">
    <div class="status" id="userDisplayName">Cargando...</div>
    <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-pill">Entorno privado</div>
    <h1>Gestiona tu<br><em>infraestructura.</em></h1>
    <p>Área exclusiva de desarrollo, pruebas e instalación de herramientas. Solo acceso interno.</p>
    <div class="stats">
      <div><span class="stat-val"><b>iorana</b>.dev</span><span class="stat-label">Dominio activo</span></div>
      <div><span class="stat-val">Redis <b>+</b> Node</span><span class="stat-label">Stack</span></div>
      <div><span class="stat-val">8<b>h</b></span><span class="stat-label">Sesión</span></div>
    </div>
  </div>

  <div class="section-head"><h2>Herramientas Autorizadas</h2></div>
  
  <div class="grid" id="toolsGrid">
    <p style="color: var(--muted)">Verificando credenciales...</p>
  </div>
</main>

<script>
  async function loadPortal() {
    try {
      const res = await fetch('/api/my-tools');
      if (!res.ok) throw new Error("No autorizado");
      const user = await res.json();

      // Actualizar nombre en la interfaz
      document.getElementById('userDisplayName').textContent = user.displayName || user.username;

      const grid = document.getElementById('toolsGrid');
      grid.innerHTML = ''; 

      // Diccionario de todas las herramientas posibles
      const toolsLibrary = [
        {
          id: 'n8n.iorana.dev',
          title: 'n8n Automation',
          desc: 'Flujos de trabajo y automatizaciones inteligentes.',
          tag: 'Workflow',
          url: 'https://n8n.iorana.dev',
          icon: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>'
        },
        {
          id: 'admin-tools', // ID interno para botones de admin
          title: 'Acceso & Seguridad',
          desc: 'Configuración de sesiones y registros de acceso.',
          tag: 'Admin',
          url: '/auth/sessions',
          icon: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
        }
      ];

      // Filtrar herramientas según el array 'tools' del usuario que viene de la API
      const allowed = toolsLibrary.filter(t => 
        user.tools.includes('*') || user.tools.includes(t.id)
      );

      if (allowed.length === 0) {
        grid.innerHTML = '<p style="color: var(--muted)">No tienes herramientas asignadas. Contacta con soporte.</p>';
        return;
      }

      allowed.forEach(tool => {
        grid.innerHTML += `
          <a href="${tool.url}" class="tool-card">
            <div class="card-ico">${tool.icon}</div>
            <div class="card-title">${tool.title}</div>
            <div class="card-desc">${tool.desc}</div>
            <span class="card-tag">${tool.tag}</span>
          </a>
        `;
      });

    } catch (err) {
      window.location.href = '/';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  });

  loadPortal();
</script>
</body>
</html>
