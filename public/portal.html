<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IORANA Dev — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:#f5600a; --navy:#0d1f35; --navy-mid:#152a40; --navy-light:#1a3050;
      --white:#ffffff; --text:#c8d8e8; --muted:#6b89a5;
      --border:rgba(255,255,255,0.08);
      --font:'Barlow',sans-serif; --font-cond:'Barlow Condensed',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}
    .bg{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,rgba(13,31,53,0.5) 0%,rgba(13,31,53,0.8) 60%,rgba(10,22,38,1) 100%), linear-gradient(135deg,#0a1826 0%,#152a40 100%)}
    
    .topbar{position:sticky;top:0;z-index:50;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(9,19,33,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-icon{width:34px;height:34px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center}
    .logo-text{font-weight:800;font-size:17px;color:var(--white)}
    .logo-text b{color:var(--orange)}
    .topbar-right{display:flex;align-items:center;gap:20px}
    .status{display:flex;align-items:center;gap:7px;font-family:var(--font-cond);font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted)}
    .status::before{content:'';width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pdot 2.5s infinite}
    @keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
    
    .logout-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:var(--font-cond);font-size:11px;font-weight:600;padding:7px 16px;cursor:pointer;transition:0.2s}
    .logout-btn:hover{color:var(--white);background:rgba(255,255,255,.04)}

    main{position:relative;z-index:1;padding:52px 40px;max-width:1000px;margin:0 auto}
    .hero{margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid var(--border)}
    .hero h1{font-weight:900;font-size:42px;line-height:1.05;margin-bottom:10px}
    .hero h1 em{color:var(--orange);font-style:italic}
    .hero p{font-size:15px;color:var(--muted);max-width:520px;line-height:1.6}
    
    .stats{display:flex;gap:40px;margin-top:32px}
    .stat-val{font-weight:900;font-size:26px;display:block}
    .stat-val b{color:var(--orange)}
    .stat-label{font-family:var(--font-cond);font-size:12px;color:var(--muted);text-transform:uppercase}

    .section-head{display:flex;align-items:center;gap:14px;margin:44px 0 20px}
    .section-head h2{font-family:var(--font-cond);font-size:13px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
    .tool-card{background:rgba(21,42,64,0.6);border:1px solid var(--border);border-radius:8px;padding:24px;text-decoration:none;transition:0.3s;display:block}
    .tool-card:hover{border-color:rgba(245,96,10,0.4);transform:translateY(-3px);background:rgba(25,48,76,0.7)}
    .card-ico{width:38px;height:38px;border-radius:6px;background:rgba(245,96,10,0.1);color:var(--orange);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .card-title{font-weight:800;font-size:16px;color:var(--white);margin-bottom:6px}
    .card-desc{font-size:13px;color:var(--muted);line-height:1.5}
    .card-tag{display:inline-block;margin-top:14px;font-family:var(--font-cond);font-size:10px;font-weight:700;color:var(--orange);background:rgba(245,96,10,0.1);padding:2px 8px;border-radius:3px;text-transform:uppercase}
  </style>
</head>
<body>
<div class="bg"></div>

<nav class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <span class="logo-text"><b>IORANA</b> Dev</span>
  </div>
  <div class="topbar-right">
    <div class="status" id="userDisplayName">Cargando...</div>
    <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
  </div>
</nav>

<main>
  <div class="hero">
    <h1>Gestiona tu<br><em>infraestructura.</em></h1>
    <p>Entorno privado de IORANA Digital. Solo herramientas autorizadas.</p>
    <div class="stats">
      <div><span class="stat-val"><b>iorana</b>.dev</span><span class="stat-label">Dominio</span></div>
      <div><span class="stat-val">Redis <b>+</b> Node</span><span class="stat-label">Stack</span></div>
    </div>
  </div>

  <div class="section-head"><h2>Herramientas Disponibles</h2></div>
  <div class="grid" id="toolsGrid">
    <p style="color: var(--muted)">Verificando credenciales...</p>
  </div>
</main>

<script>
  async function loadPortal() {
    try {
      const res = await fetch('/api/my-tools');
      if (!res.ok) throw new Error();
      const user = await res.json();

      // Actualizar nombre de usuario
      document.getElementById('userDisplayName').innerText = user.displayName || 'Usuario';

      const grid = document.getElementById('toolsGrid');
      grid.innerHTML = ''; 

      const availableTools = [
        {
          id: 'n8n.iorana.dev',
          title: 'n8n Automation',
          desc: 'Flujos de trabajo y automatizaciones inteligentes.',
          tag: 'Workflow',
          url: 'https://n8n.iorana.dev',
          icon: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>'
        },
        {
          id: 'admin-tools',
          title: 'Sesiones Redis',
          desc: 'Monitorización de sesiones activas en tiempo real.',
          tag: 'Admin',
          url: '/auth/sessions',
          icon: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>'
        }
      ];

      const myTools = availableTools.filter(t => user.tools.includes('*') || user.tools.includes(t.id));

      if (myTools.length === 0) {
        grid.innerHTML = '<p style="color: var(--muted)">No tienes herramientas asignadas.</p>';
        return;
      }

      myTools.forEach(tool => {
        grid.innerHTML += `
          <a href="${tool.url}" class="tool-card">
            <div class="card-ico">${tool.icon}</div>
            <div class="card-title">${tool.title}</div>
            <div class="card-desc">${tool.desc}</div>
            <span class="card-tag">${tool.tag}</span>
          </a>`;
      });
    } catch (err) {
      window.location.href = '/';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  });

  loadPortal();
</script>
</body>
</html>
